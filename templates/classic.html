<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Classic Menu</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
      background: #ffffff;
      color: #333;
    }

    .menu-container {

      max-width: 600px;
      margin: 0 auto;
      background: rgb(255, 243, 230);
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-transform:uppercase ;
      text-decoration: underline;
      font-size: 3.5rem;
      font-family: 'Poppins', sans-serif;
      font-weight: bold;
      color: rgb(102, 57, 11);
      text-align: center;
      margin-bottom: 2rem;
    }

    .menu {
      list-style: none;
      padding: 0;
      width: 300px;
      /* or whatever fits your layout */
      font-family: sans-serif;
      color: #6B3E27;
      /* close to brown */
      background: #FAEBDD;
      /* soft background like image */
    }

.menu-items {
  
  margin:0 5rem ;
  display: flex;
  align-items: center;
  color: rgb(102, 57, 11);
  padding: 0.5rem 0;
  gap: 0.5rem;
}
.category{
  margin-top: 1.2rem;
}

.dish {
  text-transform: capitalize;
  white-space: nowrap;
  font-size: 1.5rem;
}

.dots {
  flex: 1;
  border-bottom: 3px dotted #6B3E27;
  margin: 0 10px;
  height: 1px;
}

.price {
  font-size: 1.5rem;
  white-space: nowrap;
}


    /* .menu-items {
      text-transform: capitalize;

      margin-left: 200px;
      margin-right: 20px;
      display: flex;
      color: rgb(102, 57, 11);
      padding: 0.5rem 0;
      gap: 1rem;
    }

    .dish {

      font-weight: bolder;
      max-width: 600px;
    }

    .price {
      font-weight: bold;
    } */

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 0.5rem 0;
    }
  </style>
</head>

<body>
  <div class="menu-container">
    <h1 id="restaurant-title">Menu</h1>
    <div id="menu-root"></div>
  </div>

  {{menuDataScript}}

  <script>
    document.getElementById("restaurant-title").innerText = window.restaurantName || "Menu";

    const menuRoot = document.getElementById('menu-root');
    const data = window.menuData;

    for (const category in data) {
      const section = document.createElement('div');
      section.innerHTML = `<ul class="category">` +
        data[category].map(item => `
              <li class="menu-items">
                <span class="dish">${item.dish}</span>
                <span class="dots"> </span>
                <span class="price">₹${item.price}</span>
                </li>`).join('') +
        `</ul>`;
      menuRoot.appendChild(section);
    }
  </script>
</body>

</html>
