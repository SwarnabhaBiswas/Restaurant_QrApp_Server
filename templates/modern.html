<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Modern Menu</title>
  <style>
    body {
      height: 100%;
      padding: 2rem;
      background-color: #F4EEEB;
      color: #333333;
    }
    .menu-container {
      height:90% ;
      max-width: 600px;
      margin: 0 auto;
      background: rgb(233, 233, 233);
      padding: 0.5rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-transform:uppercase ;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      text-align: center;
      font-size: 5rem;
      margin-bottom: 1rem;
      color: #1C1C1C;
    }
    h2 {
      padding-top: 1.1rem ;
      height: 40px;
      font-weight: bold;
      margin-top: 1.5rem;
      margin-left: 10px;
      margin-right: 15px;
      padding-left: 20px;
      font-weight: 100;
      background-color: #a7a19e;
      color: #1C1C1C;
    }
    .menu-items{
      text-transform: capitalize;
      margin-left: 25px;
      margin-right: 20px;
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      gap: 3 rem;
    }

    .dish {
      font-size: 1.5rem;
      
      max-width: 600px;
      }

    .price {
      
      font-size: 1.2rem;
    }
    ul {
      font-family: 'Crimson Text', serif;
      list-style: none;
      padding: 0;
    }
    li {
      padding: 0.5rem 0;
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <h1 id="restaurant-title">Menu</h1>
    <div id="menu-root"></div>
  </div>

  {{menuDataScript}}

  <script>
    document.getElementById("restaurant-title").innerText = window.restaurantName || "Menu";

    const menuRoot = document.getElementById('menu-root');
    const data = window.menuData;

    for (const category in data) {
      const section = document.createElement('div');
      section.innerHTML = `<h2>${category}</h2> <ul>` +
        data[category].map(item => `<li class="menu-items"> <span class="dish">${item.dish} </span> <span class="price"> ₹${item.price}</li> </span>`).join('') +
        `</ul>`;
      menuRoot.appendChild(section);
    }
  </script>
</body>
</html>
