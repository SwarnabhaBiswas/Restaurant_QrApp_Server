<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Modern Menu</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Delius&family=Fascinate+Inline&family=Sriracha&display=swap');
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
      background: #f9f9f9;
      background: linear-gradient(to right, #f9f9f9, #ffe1a9);
    }
    .menu-container {
      max-width: 1000px;
      margin: 0 auto;
      background-color: #fff0d4;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-family: "Fascinate Inline", system-ui;
      font-size: 3.5rem;
      text-align: center;
      margin-bottom: 1rem;
      color: #8a4b3b;
      text-transform: uppercase;
    }
    h2 {
      font-family: 'Sriracha', cursive;
      font-size: 2rem;
      margin-top: 1.5rem;
      color: #c97e47;
      padding-left: 10rem;
      text-transform: capitalize;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      text-transform: capitalize;
      font-family: "Delius", cursive;
      word-spacing: 30rem;
      font-size: 1.5rem;
      padding: 0 10rem ;
      color: #333333;
      border-bottom: 1px;
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <h1 id="restaurant-title"></h1>
    <div id="menu-root"></div>
  </div>

  <script>window.restaurantName = "shanks dhaba";</script><script>window.menuData = {"starters":[{"category":"starters","dish":"chilli","price":"250"},{"category":"starters","dish":"corn","price":"400"}],"main course":[{"category":"main course","dish":"chicken","price":"600"},{"category":"main course","dish":"fish","price":"500"}],"desert":[{"category":"desert","dish":"cake","price":"50"},{"category":"desert","dish":"smoothie","price":"100"}]};</script>

  <script>
    document.getElementById("restaurant-title").innerText = window.restaurantName || "Menu";

    const menuRoot = document.getElementById('menu-root');
    const data = window.menuData;

    for (const category in data) {
      const section = document.createElement('div');
      section.innerHTML = `<h2>${category}</h2><ul>` +
        data[category].map(item => `<li>${item.dish} ₹${item.price}</li>`).join('') +
        `</ul>`;
      menuRoot.appendChild(section);
    }
  </script>
</body>
</html>
