<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Modern Menu</title>
    <link rel="stylesheet" href="classic.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Sriracha&display=swap");
    </style>
  </head>
  <body>
    <div class="menu-container">
      <h1 id="restaurant-title"></h1>
      <div id="menu-root"></div>
    </div>

    <script>window.restaurantName = "fdgfd";</script><script>window.menuData = {"fdg":[{"category":"fdg","dish":"dfg","price":"56"}]};</script>

    <script>
      document.getElementById("restaurant-title").innerText =
        window.restaurantName || "Menu";

      const menuRoot = document.getElementById("menu-root");
      const data = window.menuData;

      for (const category in data) {
        const section = document.createElement("div");
        section.innerHTML =
          `<h2>${category}</h2><ul>` +
          data[category]
            .map((item) => `<li>${item.dish} - ₹${item.price}</li>`)
            .join("") +
          `</ul>`;
        menuRoot.appendChild(section);
      }
    </script>
  </body>
</html>
