<!DOCTYPE html>
<html>
<head>
  <title>Modern Menu</title>
  <link rel="stylesheet" href="/styles/modern.css" />
</head>
<body>
  <div class="menu-container">
    <h1>Menu</h1>
    <div id="menu-root"></div>
  </div>

  <script> window.menuData = {"dfgdfg":[{"category":"dfgdfg","dish":"dfgdfg","price":"4564"},{"category":"dfgdfg","dish":"hjkhjk","price":"1312"}],"jkjhgjk":[{"category":"jkjhgjk","dish":"ffghf","price":"4545"}]};</script> <!-- injected script here -->

  <script>
    const menuRoot = document.getElementById('menu-root');
    const data = window.menuData;

    for (const category in data) {
      const section = document.createElement('div');
      section.innerHTML = `<h2>${category}</h2><ul>` +
        data[category].map(item => `<li>${item.dish} - ₹${item.price}</li>`).join('') +
        `</ul>`;
      menuRoot.appendChild(section);
    }

</body>
